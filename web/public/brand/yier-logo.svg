<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" role="img" aria-labelledby="title desc">
  <title id="title">Yier logo</title>
  <desc id="desc">Yier wordmark paired with the project icon.</desc>

  <svg x="28" y="28" width="244" height="244" viewBox="0 0 512 512">
    <defs>
      <filter id="bgShadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.08"/>
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
      </filter>
      <filter id="cloudDropShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3143eb" flood-opacity="0.3"/>
      </filter>
      <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
      </filter>
      <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="-4" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.2"/>
      </filter>
      <linearGradient id="cloudGrad" x1="10%" y1="10%" x2="90%" y2="90%">
        <stop offset="0%" stop-color="#b993ff"/>
        <stop offset="45%" stop-color="#7366ff"/>
        <stop offset="100%" stop-color="#2c42ea"/>
      </linearGradient>
      <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="phoneGlass" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
      </linearGradient>
    </defs>

    <rect x="36" y="36" width="440" height="440" rx="100" fill="#fdfdfd" filter="url(#bgShadow)"/>
    <g fill="none" stroke="#e4e7fa" stroke-width="2" stroke-linecap="round">
      <circle cx="256" cy="256" r="165" stroke-dasharray="8 16"/>
      <circle cx="256" cy="256" r="215" stroke-dasharray="12 24" stroke-opacity="0.6"/>
    </g>
    <g filter="url(#cloudDropShadow)">
      <path
        d="M 220 140 C 260 110, 310 120, 330 150 C 380 140, 420 170, 410 230 C 430 260, 420 320, 370 350 C 380 400, 310 410, 260 380 C 210 410, 150 390, 140 340 C 90 330, 90 260, 130 220 C 110 160, 170 130, 220 140 Z"
        fill="url(#cloudGrad)"
      />
      <path
        d="M 220 140 C 260 110, 310 120, 330 150 C 380 140, 420 170, 410 230 C 430 260, 420 320, 370 350 C 380 400, 310 410, 260 380 C 210 410, 150 390, 140 340 C 90 330, 90 260, 130 220 C 110 160, 170 130, 220 140 Z"
        fill="none"
        stroke="url(#rimLight)"
        stroke-width="3"
      />
    </g>
    <g filter="url(#glassShadow)">
      <path d="M 175 215 L 215 255 L 175 295" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="250" y1="295" x2="315" y2="295" stroke="#ffffff" stroke-opacity="0.95" stroke-width="22" stroke-linecap="round"/>
    </g>
    <g transform="translate(375, 360) rotate(-12)" filter="url(#badgeShadow)">
      <rect x="-35" y="-65" width="70" height="130" rx="16" fill="url(#phoneGlass)"/>
      <rect x="-35" y="-65" width="70" height="130" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="4"/>
      <rect x="-27" y="-57" width="54" height="114" rx="8" fill="#ffffff" fill-opacity="0.15"/>
      <line x1="-10" y1="-48" x2="10" y2="-48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <path d="M -16 6 A 24 24 0 0 1 16 6" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="4" stroke-linecap="round"/>
      <path d="M -8 16 A 12 12 0 0 1 8 16" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="26" r="4" fill="#ffffff" fill-opacity="0.95"/>
    </g>
  </svg>

  <g fill="#12131a">
    <text
      x="335"
      y="160"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="104"
      font-weight="760"
    >yier</text>
    <text
      x="341"
      y="208"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="28"
      font-weight="650"
      fill="#506178"
    >remote codex sessions anywhere</text>
  </g>
</svg>
